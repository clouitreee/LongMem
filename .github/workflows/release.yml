name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

  build:
    needs: test
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            out: longmem-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            out: longmem-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            out: longmem-macos-arm64
          - os: macos-latest
            target: bun-darwin-x64
            out: longmem-macos-x64
          - os: windows-latest
            target: bun-windows-x64
            out: longmem-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build monolith binary
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: bun build ./longmem.ts --compile --define BUILD_VERSION="\"${TAG}\"" --outfile dist/bin/${{ matrix.out }} --target ${{ matrix.target }}

      - name: Build OpenCode plugin (JS)
        if: matrix.target == 'bun-linux-x64'
        run: bun run build:opencode

      - name: Compute checksums (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist/bin
          sha256sum "${{ matrix.out }}" > "${{ matrix.out }}.sha256"

      - name: Compute checksums (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist/bin
          (Get-FileHash "${{ matrix.out }}" -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.out }}" | Out-File "${{ matrix.out }}.sha256" -Encoding utf8

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/bin/

  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build:opencode
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: dist/plugin.js

  release:
    needs: [build, plugin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release-files
          # Flatten all binaries + checksums into release-files/
          find artifacts/binaries-* -type f | while read f; do
            cp "$f" release-files/
          done
          # Copy plugin
          cp artifacts/plugin/plugin.js release-files/

      - name: Generate manifest.json
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          cat > release-files/manifest.json <<EOF
          {
            "version": "${TAG}",
            "binaries": {
              "monolith": {
                "linux-x64":    "${BASE}/longmem-linux-x64",
                "linux-arm64":  "${BASE}/longmem-linux-arm64",
                "macos-arm64":  "${BASE}/longmem-macos-arm64",
                "macos-x64":    "${BASE}/longmem-macos-x64",
                "windows-x64":  "${BASE}/longmem-windows-x64.exe"
              },
              "plugin": "${BASE}/plugin.js"
            }
          }
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/*
            install.sh
