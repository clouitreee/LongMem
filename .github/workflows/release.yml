name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            daemon_out: longmemd-linux-x64
            mcp_out: longmem-mcp-linux-x64
            hook_out: longmem-hook-linux-x64
            cli_out: longmem-cli-linux-x64
          - os: ubuntu-latest
            target: bun-linux-arm64
            daemon_out: longmemd-linux-arm64
            mcp_out: longmem-mcp-linux-arm64
            hook_out: longmem-hook-linux-arm64
            cli_out: longmem-cli-linux-arm64
          - os: macos-latest
            target: bun-darwin-arm64
            daemon_out: longmemd-macos-arm64
            mcp_out: longmem-mcp-macos-arm64
            hook_out: longmem-hook-macos-arm64
            cli_out: longmem-cli-macos-arm64
          - os: macos-latest
            target: bun-darwin-x64
            daemon_out: longmemd-macos-x64
            mcp_out: longmem-mcp-macos-x64
            hook_out: longmem-hook-macos-x64
            cli_out: longmem-cli-macos-x64
          - os: windows-latest
            target: bun-windows-x64
            daemon_out: longmemd-windows-x64.exe
            mcp_out: longmem-mcp-windows-x64.exe
            hook_out: longmem-hook-windows-x64.exe
            cli_out: longmem-cli-windows-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build daemon binary
        run: bun build ./daemon/server.ts --compile --outfile dist/bin/${{ matrix.daemon_out }} --target ${{ matrix.target }}

      - name: Build MCP binary
        run: bun build ./mcp/server.ts --compile --outfile dist/bin/${{ matrix.mcp_out }} --target ${{ matrix.target }}

      - name: Build hook binary
        run: bun build ./hooks/main.ts --compile --outfile dist/bin/${{ matrix.hook_out }} --target ${{ matrix.target }}

      - name: Build CLI binary
        run: bun build ./install.ts --compile --outfile dist/bin/${{ matrix.cli_out }} --target ${{ matrix.target }}

      - name: Build OpenCode plugin (JS)
        if: matrix.target == 'bun-linux-x64'
        run: bun run build:opencode

      - name: Compute checksums (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist/bin
          for f in ${{ matrix.daemon_out }} ${{ matrix.mcp_out }} ${{ matrix.hook_out }} ${{ matrix.cli_out }}; do
            sha256sum "$f" > "$f.sha256"
          done

      - name: Compute checksums (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist/bin
          foreach ($f in @("${{ matrix.daemon_out }}", "${{ matrix.mcp_out }}", "${{ matrix.hook_out }}", "${{ matrix.cli_out }}")) {
            (Get-FileHash $f -Algorithm SHA256).Hash.ToLower() + "  $f" | Out-File "$f.sha256" -Encoding utf8
          }

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/bin/

  plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build:opencode
      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: dist/plugin.js

  release:
    needs: [build, plugin]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          mkdir -p release-files
          # Flatten all binaries + checksums into release-files/
          find artifacts/binaries-* -type f | while read f; do
            cp "$f" release-files/
          done
          # Copy plugin
          cp artifacts/plugin/plugin.js release-files/

      - name: Generate manifest.json
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          cat > release-files/manifest.json <<EOF
          {
            "version": "${TAG}",
            "binaries": {
              "daemon": {
                "linux-x64":    "${BASE}/longmemd-linux-x64",
                "linux-arm64":  "${BASE}/longmemd-linux-arm64",
                "macos-arm64":  "${BASE}/longmemd-macos-arm64",
                "macos-x64":    "${BASE}/longmemd-macos-x64",
                "windows-x64":  "${BASE}/longmemd-windows-x64.exe"
              },
              "mcp": {
                "linux-x64":    "${BASE}/longmem-mcp-linux-x64",
                "linux-arm64":  "${BASE}/longmem-mcp-linux-arm64",
                "macos-arm64":  "${BASE}/longmem-mcp-macos-arm64",
                "macos-x64":    "${BASE}/longmem-mcp-macos-x64",
                "windows-x64":  "${BASE}/longmem-mcp-windows-x64.exe"
              },
              "hook": {
                "linux-x64":    "${BASE}/longmem-hook-linux-x64",
                "linux-arm64":  "${BASE}/longmem-hook-linux-arm64",
                "macos-arm64":  "${BASE}/longmem-hook-macos-arm64",
                "macos-x64":    "${BASE}/longmem-hook-macos-x64",
                "windows-x64":  "${BASE}/longmem-hook-windows-x64.exe"
              },
              "cli": {
                "linux-x64":    "${BASE}/longmem-cli-linux-x64",
                "linux-arm64":  "${BASE}/longmem-cli-linux-arm64",
                "macos-arm64":  "${BASE}/longmem-cli-macos-arm64",
                "macos-x64":    "${BASE}/longmem-cli-macos-x64",
                "windows-x64":  "${BASE}/longmem-cli-windows-x64.exe"
              },
              "plugin": "${BASE}/plugin.js"
            }
          }
          EOF

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/*
            install.sh
